name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python -m py_compile scripts/build_review_canvas.py scripts/find_latest_annotations.py scripts/validate_annotation_bundle.py
      - name: Validate example bundle
        run: python scripts/validate_annotation_bundle.py --annotations examples/user-test-annotations.json --fix-brief examples/user-test-fix-brief.md
      - name: Build example review canvas
        run: python scripts/build_review_canvas.py --media examples/demo-banner.svg --media-type image --out review.html --title "Banner review"
